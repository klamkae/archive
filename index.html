<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klamka Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav id="nav"></nav>
    <div class="header-text">
      <h1>Klamka Archive</h1>
      <p id="subtitle">WPD admins are retards</p>
    </div>
  </header>

  <main>
    <div id="feed"></div>
  </main>

  <script>
    fetch('edits.json')
      .then(r => r.json())
      .then(data => {
        const nav = document.getElementById('nav');
        const feed = document.getElementById('feed');
        let active = 'all';

        const allCategories = ['all', ...data.categories];

        function renderNav() {
          nav.innerHTML = '';
          allCategories.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat;
            btn.className = cat === active ? 'active' : '';
            btn.onclick = () => { active = cat; renderNav(); renderFeed(); };
            nav.appendChild(btn);
          });
        }

        function renderFeed() {
          feed.innerHTML = '';
          const list = active === 'all'
            ? data.all
            : data.all.filter(v => v.category === active);

          list.forEach(({ file }) => {
            const wrap = document.createElement('div');
            wrap.className = 'wrap';

            const video = document.createElement('video');
            video.controls = true;
            video.muted = false;
            video.volume = 0.2;
            video.playsInline = true;
            video.src = 'edits/' + file;

            const title = document.createElement('p');
            title.className = 'title';
            title.textContent = file;

            wrap.appendChild(video);
            wrap.appendChild(title);
            feed.appendChild(wrap);
          });
        }

        renderNav();
        renderFeed();
      });
  </script>

</body>
</html>
